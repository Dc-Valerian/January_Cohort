<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f9fafb;
        margin-top: 50px;
      }

      h1 {
        color: #333;
      }
      .emoji-container {
        margin: 2px;
      }
      button {
        font-size: 2rem;
        margin: 10px;
        cursor: pointer;
        border: none;
        background: transparent;
        transition: transform 0.2s;
      }

      button:hover {
        transform: scale(1.3);
      }
      #output {
        margin-top: 30px;
        font-size: 1.5rem;
        color: #555;
      }

      .fade {
        animation: fadeIn 0.5s ease-in-out;
      }
    </style>
  </head>
  <body>
    <h1>⭐Emoji Mood Board</h1>
    <p>Select Your Mood for Today!</p>

    <div class="emoji-container">
      <button onclick="setMood('☺️ Happy')">☺️</button>
      <button onclick="setMood('😔 Sad')">😔</button>
      <button onclick="setMood('😡 Angry')">😡</button>
      <button onclick="setMood('😴 Sleepy')">😴</button>
      <button onclick="setMood('🤩 Exicted')">🤩</button>
    </div>

    <div id="output"></div>

    <script>
      function setMood(mood) {
        const output = document.getElementById("output");

        output.innerHTML = `<p class="fade"> You are feeling <strong>${mood}</strong> today!`;
      }
    </script>
  </body>
</html>
